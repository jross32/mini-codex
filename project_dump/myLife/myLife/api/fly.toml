# fly.toml generated for mylife-api
app = "mylife-api"
primary_region = "iad"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services.concurrency]]
  type = "connections"
  soft_limit = 25
  hard_limit = 50

[processes]
  app = "gunicorn app.main:app --bind 0.0.0.0:8080"
