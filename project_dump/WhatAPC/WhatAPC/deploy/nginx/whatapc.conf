server {
    listen 80;
    listen [::]:80;
    server_name whatapc.com www.whatapc.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name whatapc.com www.whatapc.com;

    # Replace with your certificate paths.
    ssl_certificate /etc/letsencrypt/live/whatapc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatapc.com/privkey.pem;

    root /var/www/whatapc/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri /index.html;
    }
}
