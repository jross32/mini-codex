{% extends "base.html" %}
{% block title %}Sign Up | Life OS{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:520px;">
  <div class="card card-soft p-4">
    <h4 class="fw-bold mb-2">Create your Life OS</h4>
    <div class="subtle small mb-3">Set a username and password to personalize your workspace.</div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input name="name" class="form-control bg-dark text-light" value="{{ name or '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control bg-dark text-light" value="{{ username or '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control bg-dark text-light" required>
      </div>
      <button class="btn btn-info w-100">Sign Up</button>
    </form>
    <div class="text-center mt-3 subtle small">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</div>
{% endblock %}
