{% extends "base.html" %}
{% block title %}Notes | Life OS{% endblock %}
{% block content %}
<div class="hero mb-3">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <div>
      <div class="subtle text-uppercase small">Notes</div>
      <h3 class="fw-bold mb-0">Notebook</h3>
    </div>
    <form class="d-flex gap-2 flex-wrap" method="post" action="{{ url_for('notes_add') }}">
      <input name="title" class="form-control form-control-sm bg-dark text-light" placeholder="Title">
      <input name="tags" class="form-control form-control-sm bg-dark text-light" placeholder="Tags (comma separated)">
      <input name="excerpt" class="form-control form-control-sm bg-dark text-light" placeholder="Note body" required>
      <button class="btn btn-info btn-sm">Add</button>
    </form>
  </div>
</div>
<div class="grid-2">
  {% for n in data.notes %}
  <div class="card card-soft p-3 h-100 d-flex flex-column">
    <div class="fw-semibold mb-1">{{ n.title }}</div>
    <div class="subtle small mb-2">Tags: {{ n.tags|join(', ') }}</div>
    <div class="subtle flex-grow-1">{{ n.excerpt }}</div>
    <div class="mt-2 d-flex gap-2">
      <button class="btn btn-sm btn-outline-info flex-fill" data-bs-toggle="collapse" data-bs-target="#note-edit-{{ n.id }}">Edit</button>
      <form method="post" action="{{ url_for('notes_delete', note_id=n.id) }}" class="flex-fill">
        <button class="btn btn-sm btn-outline-danger w-100">Delete</button>
      </form>
    </div>
    <div class="collapse mt-2" id="note-edit-{{ n.id }}">
      <form class="card card-soft p-2 bg-dark" method="post" action="{{ url_for('notes_update', note_id=n.id) }}">
        <div class="row g-2">
          <div class="col-12">
            <input name="title" class="form-control form-control-sm bg-dark text-light" value="{{ n.title }}">
          </div>
          <div class="col-12">
            <input name="excerpt" class="form-control form-control-sm bg-dark text-light" value="{{ n.excerpt }}">
          </div>
          <div class="col-12">
            <input name="tags" class="form-control form-control-sm bg-dark text-light" value="{{ n.tags|join(', ') }}">
          </div>
        </div>
        <div class="mt-2 text-end">
          <button class="btn btn-sm btn-info">Save</button>
        </div>
      </form>
    </div>
  </div>
  {% else %}
  <div class="text-secondary small">No notes yet. Add one above.</div>
  {% endfor %}
</div>
{% endblock %}
