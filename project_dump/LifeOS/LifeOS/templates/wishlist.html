{% extends "base.html" %}
{% block title %}Wishlist | Life OS{% endblock %}
{% block content %}
<div class="hero mb-3">
  <div class="d-flex justify-content-between align-items-center">
    <div>
      <div class="subtle text-uppercase small">Wishlist</div>
      <h3 class="fw-bold mb-0">Things to Buy</h3>
    </div>
    <span class="pill">Items: {{ data.wishlist|length }}</span>
  </div>
</div>
<div class="card card-soft p-3">
  <div class="list-plain">
    {% for w in data.wishlist %}
    <li class="d-flex justify-content-between align-items-center">
      <div>
        <div class="fw-semibold">{{ w.item }}</div>
        <div class="subtle small">Priority: {{ w.priority }}</div>
      </div>
      <span class="text-info">${{ w.cost }}</span>
    </li>
    {% endfor %}
  </div>
</div>
{% endblock %}
