<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI App Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <h1>AI App Generator</h1>
    <p>Generate starter app artifacts from a prompt.</p>
    <form id="gen-form">
      <textarea id="prompt" placeholder="Describe the app you want" required></textarea>
      <button type="submit">Generate</button>
    </form>
    <section>
      <h2>Latest Result</h2>
      <pre id="result">No generation run yet.</pre>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
